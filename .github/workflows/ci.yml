name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Lint Commit Messages
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FROM="${{ github.event.pull_request.base.sha }}"
            TO="${{ github.event.pull_request.head.sha }}"
          else
            FROM="${{ github.event.before }}"
            TO="${{ github.sha }}"
          fi

          if [[ "$FROM" == "0000000000000000000000000000000000000000" ]]; then
            FROM="$(git rev-list --max-parents=0 "$TO")"
          fi

          echo "Linting commits from $FROM to $TO"
          npx --no -- commitlint --from "$FROM" --to "$TO" --verbose

  test-build:
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run test:coverage
      - name: Coverage Summary
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const path = "coverage/coverage-summary.json";
            if (!fs.existsSync(path)) {
              console.log("Coverage summary not found.");
              process.exit(0);
            }
            const summary = JSON.parse(fs.readFileSync(path, "utf8")).total;
            const pct = (m) => `${summary[m].pct}%`;
            const out = [
              "### Coverage",
              "",
              "| Metric | Percent |",
              "| --- | --- |",
              `| Lines | ${pct("lines")} |`,
              `| Statements | ${pct("statements")} |`,
              `| Functions | ${pct("functions")} |`,
              `| Branches | ${pct("branches")} |`,
            ].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out + "\n");
          '
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          if-no-files-found: error
      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- fdo-sdk-coverage-report -->";
            const path = "coverage/coverage-summary.json";
            if (!fs.existsSync(path)) {
              core.warning("Coverage summary file not found; skipping PR comment.");
              return;
            }

            const total = JSON.parse(fs.readFileSync(path, "utf8")).total;
            const pct = (k) => `${total[k].pct}%`;

            const body = [
              marker,
              "## Coverage Report",
              "",
              "| Metric | Percent |",
              "| --- | --- |",
              `| Lines | ${pct("lines")} |`,
              `| Statements | ${pct("statements")} |`,
              `| Functions | ${pct("functions")} |`,
              `| Branches | ${pct("branches")} |`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              c.user?.type === "Bot" && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
      - run: npm run test:examples
      - run: npm run build
      - run: npm run verify:pack
